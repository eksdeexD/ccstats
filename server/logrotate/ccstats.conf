# ccstats — log rotation policy for the MAIN stats box.
#
# Installed to /etc/logrotate.d/ccstats by server/deploy.sh. It is run automatically by the
# distro's logrotate — via the systemd logrotate.timer on modern Debian/Ubuntu, or via
# /etc/cron.daily/logrotate on older setups. NOTE: logrotate is its own package (NOT part of
# systemd); it ships in the Debian/Ubuntu base system, so on the supported targets it is always
# present. deploy.sh warns if /etc/logrotate.d is missing.
#
# Covers every append-style log our root crons write on main:
#   /var/log/claude-stats.log         (extract --mode full, ~every 5 min)
#   /var/log/claude-stats-limits.log  (usage-monitor.py, ~every 2 min)
#   /var/log/claude-stats-*.log       (e.g. a separate competition-cron log, if you add one)
# The systemd services (claude-live-monitor, claude-bottleneck-monitor) log to the journal, which
# journald already size-caps — they are not files and need nothing here.

/var/log/claude-stats*.log {
    weekly
    rotate 8
    maxsize 50M
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
}
